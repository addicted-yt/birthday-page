<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rr">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>

    <!-- 背景渐变：深蓝黑 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#0e1220"/>
      <stop offset="100%" stop-color="#070910"/>
    </linearGradient>

    <!-- 贺卡正面渐变（深色卡面） -->
    <linearGradient id="cardFront" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#1c2038"/>
      <stop offset="100%" stop-color="#111525"/>
    </linearGradient>

    <!-- 贺卡内页渐变（稍亮，奶白） -->
    <linearGradient id="cardInner" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>

    <!-- 封面边缘细亮线 -->
    <linearGradient id="edgeShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>

    <!-- 内页顶部细线装饰渐变 -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8a96e" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#c8a96e" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#c8a96e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </linearGradient>

    <!-- 投影 -->
    <filter id="shadow" x="-20%" y="-10%" width="150%" height="130%">
      <feDropShadow dx="6" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g clip-path="url(#rr)">
    <!-- 背景 -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!--
      贺卡构图：
      - 内页（右侧，稍微露出）：从装订线向右展开，轻微透视
      - 封面（左侧主体）：微微向右翻开约20°，产生立体感
      装订线在画面约 x=148 处（偏左）
    -->

    <!-- 内页（背景层，奶白色，右侧展开） -->
    <polygon
      points="148,82  420,72  420,440  148,430"
      fill="url(#cardInner)"
      filter="url(#innerShadow)"
    />

    <!-- 内页：顶部金色细装饰线 -->
    <line x1="175" y1="118" x2="395" y2="112" stroke="url(#accentLine)" stroke-width="1.2"/>

    <!-- 内页：底部金色细装饰线 -->
    <line x1="175" y1="394" x2="395" y2="400" stroke="url(#accentLine)" stroke-width="1.2"/>

    <!-- 内页文字区域：三条细横线模拟祝福文字 -->
    <line x1="192" y1="210" x2="360" y2="207" stroke="#b0a898" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <line x1="192" y1="238" x2="320" y2="235" stroke="#b0a898" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="192" y1="266" x2="340" y2="263" stroke="#b0a898" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

    <!-- 内页：小星形装饰（居中偏上，金色） -->
    <!-- 4尖小星 cx=280 cy=168 -->
    <polygon points="280,148  283,163  298,166  283,169  280,184  277,169  262,166  277,163"
      fill="#c8a96e" opacity="0.85"/>

    <!-- 封面（主体，深色，微微翻开） -->
    <!-- 翻开效果：封面左边缘在 x≈60，右边缘（装订线）在 x≈148，但顶部右角向右偏，底部右角向右偏，造成透视 -->
    <polygon
      points="72,76   148,82   148,430  72,436"
      fill="url(#cardFront)"
      filter="url(#shadow)"
    />

    <!-- 封面顶部边缘亮线 -->
    <line x1="72" y1="76" x2="148" y2="82" stroke="url(#edgeShine)" stroke-width="1"/>

    <!-- 封面左边缘竖线（装订感） -->
    <line x1="72" y1="76" x2="72" y2="436" stroke="#ffffff" stroke-width="0.6" opacity="0.12"/>

    <!-- 封面：装订线（内侧阴影线） -->
    <line x1="148" y1="82" x2="148" y2="430" stroke="#000000" stroke-width="3" opacity="0.25"/>
    <line x1="148" y1="82" x2="148" y2="430" stroke="#ffffff" stroke-width="0.8" opacity="0.08"/>

    <!-- 封面正面的极简装饰：居中一颗小四尖星 + 细圆圈 -->
    <!-- 封面中心 x≈110, y≈256 -->
    <circle cx="110" cy="254" r="22" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.18"/>
    <!-- 四尖星 -->
    <polygon points="110,236  112.5,251.5  128,254  112.5,256.5  110,272  107.5,256.5  92,254  107.5,251.5"
      fill="#ffffff" opacity="0.75"/>
    <!-- 中心亮核 -->
    <circle cx="110" cy="254" r="3" fill="#ffffff" opacity="0.95"/>

    <!-- 封面顶部细字样区域（两条极淡横线） -->
    <line x1="82"  y1="138" x2="138" y2="140" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
    <line x1="88"  y1="152" x2="132" y2="154" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.12"/>

    <!-- 封面底部极淡装饰线 -->
    <line x1="82"  y1="370" x2="138" y2="372" stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.13"/>
  </g>
</svg>
