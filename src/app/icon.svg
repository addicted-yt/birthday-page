<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d1bg512" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#141a30"/>
      <stop offset="100%" stop-color="#090c18"/>
    </radialGradient>
    <radialGradient id="d1glow512" cx="55%" cy="62%" r="40%">
      <stop offset="0%" stop-color="rgba(190,150,70,0.16)"/>
      <stop offset="60%" stop-color="rgba(190,150,70,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="d1core512" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(210,175,90,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="d1blur512" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#d1bg512)"/>
  <!-- 暖色光晕层 -->
  <rect width="512" height="512" rx="108" fill="url(#d1glow512)"/>
  <rect width="512" height="512" rx="108" fill="url(#d1core512)"/>
  <!-- 星：偏左上，微旋转，不完美 -->
  <g transform="rotate(-6, 228, 244)">
    <!-- 星的光晕 -->
    <polygon points="228,193 235.5,238 282,244 235.5,250 228,295 220.5,250 174,244 220.5,238"
      fill="#c8a96e" opacity="0.2" filter="url(#d1blur512)"/>
    <!-- 星本体 -->
    <polygon points="228,205 233.5,235 264,244 233.5,253 228,283 222.5,253 192,244 222.5,235"
      fill="#c8a96e"/>
    <!-- 亮核 -->
    <circle cx="228" cy="244" r="9" fill="#dabb7a" opacity="0.95"/>
    <circle cx="228" cy="244" r="4.5" fill="#eee0b8"/>
  </g>
  <!-- 环境星光点（极淡，增加层次） -->
  <circle cx="340" cy="150" r="2.5" fill="#a0a8c8" opacity="0.35"/>
  <circle cx="150" cy="180" r="1.8" fill="#b0a890" opacity="0.25"/>
  <circle cx="380" cy="340" r="2" fill="#c0b098" opacity="0.2"/>
  <circle cx="120" cy="350" r="1.5" fill="#a0a0c0" opacity="0.2"/>
  <circle cx="360" cy="110" r="1.5" fill="#b8b0c0" opacity="0.18"/>
  <circle cx="170" cy="380" r="2" fill="#a8a0b0" opacity="0.15"/>
  <circle cx="300" cy="390" r="1.2" fill="#c0a888" opacity="0.18"/>
</svg>
